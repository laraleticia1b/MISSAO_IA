<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

            <title>Missão IA</title>

                <link rel="stylesheet" href="style.css">

                </head>

                <body>

                    <div class="container">

                            <h1>MISSÃO IA</h1>

                                    <div id="inicio">

                                                <h2>Bem-vindo(a)!</h2>

                                                            <p>
                                                                            Antes de iniciar sua missão,
                                                                                            informe seu nome.
                                                                                                        </p>

                                                                                                                    <input
                                                                                                                                    type="text"
                                                                                                                                                    id="nome"
                                                                                                                                                                    placeholder="Digite seu nome">

                                                                                                                                                                                <button onclick="iniciar()">
                                                                                                                                                                                                Começar Missão
                                                                                                                                                                                                            </button>

                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                            <div id="jogo" style="display:none;">

                                                                                                                                                                                                                                        <h2 id="titulo"></h2>

                                                                                                                                                                                                                                                    <p id="texto"></p>

                                                                                                                                                                                                                                                                <div class="botoes">

                                                                                                                                                                                                                                                                                <button id="btn1"></button>

                                                                                                                                                                                                                                                                                                <button id="btn2"></button>

                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                            <div id="fim" style="display:none;">

                                                                                                                                                                                                                                                                                                                                        <h2>Missão Concluída</h2>

                                                                                                                                                                                                                                                                                                                                                    <p id="resultado"></p>

                                                                                                                                                                                                                                                                                                                                                                <button onclick="location.reload()">
                                                                                                                                                                                                                                                                                                                                                                                Jogar Novamente
                                                                                                                                                                                                                                                                                                                                                                                            </button>

                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                            <script src="script.js"></script>

                                                                                                                                                                                                                                                                                                                                                                                                            </body>

                                                                                                                                                                                                                                                                                                                                                                                                            </html>
